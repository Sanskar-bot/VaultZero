[build]
builder = "DOCKERFILE"
# Path is relative to repo root — Railway uses repo root as Docker build context,
# which is what we need so the Dockerfile can COPY both core/ and backend/
dockerfilePath = "backend/Dockerfile"

[deploy]
# prisma db push runs once in a separate container before the app starts.
# It applies schema.prisma directly to the Railway DB — no migration files needed.
# Switch to "migrate deploy" once you start using migrations.
preDeployCommand = "npx prisma db push --schema=backend/prisma/schema.prisma --accept-data-loss --skip-generate"
startCommand = "node backend/dist/server.js"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
