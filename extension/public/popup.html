<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VaultZero</title>
  <!--
    Content Security Policy (enforced by manifest.json extension_pages CSP):
      script-src 'self'      — only load scripts from this extension package
      object-src 'none'      — no plugins (Flash, Java, etc.)
      base-uri 'none'        — prevent base tag injection attacks

    This means:
      ✅ <script src="dist/popup.js"> works (same origin)
      ❌ <script>inline code</script> is blocked (no 'unsafe-inline')
      ❌ eval(), new Function(), setTimeout(string) are all blocked (no 'unsafe-eval')
  -->
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #root {
      width: 380px;
      min-height: 500px;
      max-height: 600px;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0f1a;
      color: #e0e0f0;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <!-- popup.js is the IIFE bundle generated by esbuild -->
  <script src="dist/popup.js"></script>
</body>
</html>
